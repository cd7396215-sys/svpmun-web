<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPMUN — Inscripciones 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Tus variables originales */
      --white:     #ffffff;
      --blu-1:     #d6eaff;
      --blu-2:     #8ec5f7;
      --blu-3:     #3a8fe0;
      --blu-4:     #1248a8;
      --navy:      #071630;
      --navy-mid:  #0e254a;
      --txt-mid:   #2d4a72;
      --gold:      #FFD700;
      --gold-glow: rgba(255, 215, 0, 0.8);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--navy);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* --- LOADER --- */
    #loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100vh;
      background: var(--navy);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.exit {
      opacity: 0;
      visibility: hidden;
    }
    .ld-bar {
      width: 300px;
      height: 4px;
      background: var(--navy-mid);
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }
    #ldProgress {
      height: 100%;
      width: 0%;
      background: var(--blu-3);
      transition: width 0.2s ease;
    }
    #ldPct {
      margin-top: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.2rem;
      color: var(--blu-2);
    }
    #access-granted {
      opacity: 0;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      margin-top: 15px;
      transition: opacity 0.5s ease;
    }
    #access-granted.show {
      opacity: 1;
    }

    /* --- HERO SECTION (DONDE OCURRE LA MAGIA DEL RAYO) --- */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-mid) 0%, var(--navy) 100%);
    }

    /* Contenedor exclusivo para los rayos detrás del título */
    #lightning-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* Detrás del texto */
      pointer-events: none; /* Para que no estorbe al hacer clic */
    }

    .hero-content {
      position: relative;
      z-index: 10; /* Por encima de los rayos */
      padding: 2rem;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: 6rem;
      font-weight: 900;
      color: var(--white);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
      letter-spacing: 5px;
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--blu-2);
      font-style: italic;
    }

    /* Animación y estilos de la figura geométrica del rayo */
    .lightning-bolt {
      position: absolute;
      width: 150px; /* Tamaño base del rayo */
      height: auto;
      opacity: 0;
      filter: drop-shadow(0 0 25px var(--gold-glow)) drop-shadow(0 0 50px var(--gold-glow));
    }

    /* La animación épica de destello */
    @keyframes thunderStrike {
      0%   { opacity: 0; transform: translateY(-50px) scale(1) rotate(0deg); }
      10%  { opacity: 1; transform: translateY(0) scale(1.1) rotate(0deg); }
      15%  { opacity: 0; }
      20%  { opacity: 1; }
      30%  { opacity: 0; }
      100% { opacity: 0; }
    }

    /* --- INSCRIPTION SECTION (RESOLVIENDO EL ESPACIO VACÍO) --- */
    .inscription-section {
      min-height: 100vh;
      padding: 5rem 2rem;
      background-color: var(--navy);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background: var(--navy-mid);
      border: 1px solid var(--blu-4);
      padding: 3rem;
      border-radius: 10px;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .form-container h2 {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--gold);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
      color: var(--blu-2);
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 1rem;
      background: var(--navy);
      border: 1px solid var(--blu-4);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      border-radius: 5px;
      transition: border-color 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: var(--blu-4);
      color: var(--white);
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: var(--gold);
      color: var(--navy);
      box-shadow: 0 0 20px var(--gold-glow);
    }

  </style>
</head>
<body>

  <div id="loader">
    <div style="font-family: 'Cinzel', serif; font-size: 2rem; color: var(--white);">INICIALIZANDO SISTEMA</div>
    <div class="ld-bar"><div id="ldProgress"></div></div>
    <div id="ldPct">0%</div>
    <div id="access-granted">ACCESO CONCEDIDO</div>
  </div>

  <section class="hero">
    <div id="lightning-container"></div>
    <div class="hero-content">
      <h1 class="hero-title">SPMUN 2026</h1>
      <p class="hero-subtitle">El futuro de la diplomacia comienza aquí</p>
    </div>
  </section>

  <section class="inscription-section">
    <div class="form-container">
      <h2>Portal de Delegaciones</h2>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="nombre">Nombre Completo del Delegado</label>
          <input type="text" id="nombre" placeholder="Ej. Carolina Sánchez" required>
        </div>
        <div class="form-group">
          <label for="comite">Comité de Preferencia</label>
          <select id="comite" required>
            <option value="">Selecciona un comité...</option>
            <option value="ecosoc">ECOSOC</option>
            <option value="cs">Consejo de Seguridad</option>
            <option value="crisis">Gabinete de Crisis</option>
            <option value="historico">Comité Histórico (Carta de Jamaica)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="experiencia">Experiencia Previa (Modelos)</label>
          <input type="number" id="experiencia" min="0" placeholder="Número de modelos asistidos" required>
        </div>
        <button type="submit" class="submit-btn">REGISTRAR DELEGADO</button>
      </form>
    </div>
  </section>

  <script>
    /* LÓGICA DEL LOADER (Mejorada de tu original) */
    (function(){
      const fill = document.getElementById('ldProgress');
      const pct = document.getElementById('ldPct');
      const ag = document.getElementById('access-granted');
      const loader = document.getElementById('loader');
      let progress = 0;

      const iv = setInterval(function(){
        progress = Math.min(100, progress + Math.random() * 15 + 5);
        fill.style.width = progress + '%';
        pct.textContent  = Math.floor(progress) + '%';
        if(progress >= 100){
          clearInterval(iv);
          setTimeout(function(){
            ag.classList.add('show');
            setTimeout(function(){
              loader.classList.add('exit');
              setTimeout(function(){ loader.remove(); }, 800);
            }, 1000);
          }, 300);
        }
      }, 150);
    })();

    /* LÓGICA ÉPICA DE LOS RAYOS DORADOS */
    const lightningContainer = document.getElementById('lightning-container');

    // SVG exacto de un rayo sólido para que se vea la forma real
    const boltSVG = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="var(--gold)"/>
      </svg>
    `;

    function strikeLightning() {
      // Creamos el elemento del rayo
      const bolt = document.createElement('div');
      bolt.classList.add('lightning-bolt');
      bolt.innerHTML = boltSVG;

      // Generamos posiciones aleatorias (centrado más hacia el título)
      const randomLeft = Math.floor(Math.random() * 60) + 20; // Entre 20% y 80% del ancho
      const randomTop = Math.floor(Math.random() * 30); // Cae desde arriba (0 a 30% del alto)
      const randomScale = (Math.random() * 2) + 1; // Tamaño entre 1x y 3x
      const randomRotation = Math.floor(Math.random() * 60) - 30; // Ángulo entre -30 y 30 grados

      // Aplicamos los estilos calculados
      bolt.style.left = `${randomLeft}%`;
      bolt.style.top = `${randomTop}%`;
      bolt.style.transform = `scale(${randomScale}) rotate(${randomRotation}deg)`;
      
      // Aplicamos la animación
      bolt.style.animation = `thunderStrike 1s ease-out forwards`;

      // Añadimos el rayo al contenedor
      lightningContainer.appendChild(bolt);

      // Eliminamos el div del DOM después de que termine la animación (1 segundo)
      // para no saturar la memoria y que tu web no se ponga lenta
      setTimeout(() => {
        if (lightningContainer.contains(bolt)) {
          lightningContainer.removeChild(bolt);
        }
      }, 1000);
    }

    // Intervalo de tormenta eléctrica (Un rayo cada 2 a 5 segundos)
    function storm() {
      strikeLightning();
      const nextStrike = Math.random() * 3000 + 2000; // Entre 2000ms y 5000ms
      setTimeout(storm, nextStrike);
    }

    // Iniciamos la tormenta después de que pase el loader (aprox 2.5s)
    setTimeout(storm, 2500);

  </script>
</body>
</html>
